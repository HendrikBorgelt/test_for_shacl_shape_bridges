# Bridge 1a — Core Data Generation Pattern
# ---------------------------------------------------------------------------
# Maps the central DCAT-AP+ provenance chain:
#   Dataset --wasGeneratedBy--> DataGeneratingActivity --used--> EvaluatedEntity
#
# Source design pattern: PROV-O (flat Activity-Entity relationships)
# Target design pattern: NFDICore / BFO (process with participation axioms)
#
# Discrimination strategy: The graph shape (dcat:Dataset as root, connected
# via prov:wasGeneratedBy to an Activity that prov:used an Entity) uniquely
# identifies DataGeneratingActivity instances despite sharing rdf:type
# prov:Activity with other DCAT-AP+ classes.
# ---------------------------------------------------------------------------

metadata:
  title: "DCAT-AP+ Dataset Generation to NFDICore"
  version: "0.1.0"
  creator: "SHACL Bridges / DCAT-AP+ to NFDICore mapping project"
  license: "CC-BY-4.0"
  mapping_justification: "semapv:ManualMappingCuration"

prefixes:
  dcat:    "http://www.w3.org/ns/dcat#"
  prov:    "http://www.w3.org/ns/prov#"
  dcterms: "http://purl.org/dc/terms/"
  nfdi:    "https://nfdi.fiz-karlsruhe.de/ontology/"
  obo:     "http://purl.obolibrary.org/obo/"

source_pattern:
  root: "dcat:Dataset"
  triples:
    # ── Core structural triples ──────────────────────────────────────────────
    # Dataset generated by a DataGeneratingActivity which used an EvaluatedEntity
    - ["dcat:Dataset",  "prov:wasGeneratedBy", "prov:Activity"]
    - ["prov:Activity", "prov:used",           "prov:Entity"]

    # ── Peripheral validation triple ─────────────────────────────────────────
    # Dataset is about the EvaluatedEntity (dcterms:subject in the source RDF)
    # This is peripheral because prov:Entity is already in the class_map,
    # but dcat:Dataset→dcterms:subject is an additional constraint that
    # validates the subgraph shape without affecting the SPARQL WHERE.
    # NOTE: This triple is commented out for now because dcterms:subject
    # may not always be present in minimal datasets. We start with the
    # minimal core pattern and can add validation triples later.
    # - ["dcat:Dataset",  "dcterms:subject",     "prov:Entity"]

target_pattern:
  triples:
    # Dataset participates in a data producing process (BFO:0000056 = participates_in)
    - ["nfdi:NFDI_0000009", "obo:BFO_0000056", "nfdi:NFDI_0010029"]
    # The process has the EvaluatedEntity as participant (BFO:0000057 = has_participant)
    - ["nfdi:NFDI_0010029", "obo:BFO_0000057", "prov:Entity"]

class_map:
  - source: "dcat:Dataset"
    target: "nfdi:NFDI_0000009"
    justification: "semapv:ManualMappingCuration"
    comment: >
      dcat:Dataset → NFDICore dataset (NFDI_0000009). Both represent a
      structured collection of data. NFDICore dataset is a subclass of
      IAO:information_content_entity, which is consistent with DCAT's
      definition. The CSV mapping confirms: dcat:Dataset → NFDI:0000009.

  - source: "prov:Activity"
    target: "nfdi:NFDI_0010029"
    justification: "semapv:ManualMappingCuration"
    comment: >
      DataGeneratingActivity (prov:Activity) → NFDICore data producing
      process (NFDI_0010029). Per the Prov-O→BFO paper (Prudhomme 2025),
      prov:Activity ≡ BFO:process. NFDI_0010029 is a subclass of
      data_handling_process (BFO:process) specifically for data production.
      Alternative: NFDI_0010031 (dataset creation process) — to be confirmed
      by domain expert.

  - source: "prov:Entity"
    target: "prov:Entity"
    justification: "semapv:ManualMappingCuration"
    comment: >
      EvaluatedEntity retains its source IRI and rdf:type. Per the
      Prov-O→BFO paper, prov:Entity maps to a subclass of BFO:continuant.
      More specific typing (e.g., to BFO:material_entity for substance
      samples) will be handled by domain-specific bridges or the
      ClassifierMixin's rdf_type assertions already in the source data.
