site_name: SHACL Bridges
site_description: N-to-m semantic mapping via SHACL shapes with SPARQL CONSTRUCT rules
site_url: ""
repo_url: https://github.com/your-org/shacl-bridges
repo_name: shacl-bridges

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Concepts: concepts.md
  - YAML Format: yaml_format.md
  - Root Selection: root_selection.md
  - Validator: validate.md
  - API Reference: api.md
  - Examples:
      - Process → Experiment: examples/process_experiment.md
